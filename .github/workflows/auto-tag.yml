name: Auto-tag on version bump

# When a new version lands on main (a package.json version bump), create the
# matching vX.Y.Z tag. That tag triggers release.yml (build + publish + Homebrew
# tap / Scoop / winget bumps), so cutting a release is just merging the
# "Release vX.Y.Z" PR — no hand-typed tag, which fits the PR-only main workflow.
#
# Safe to fire on any package.json change: if the tag for the current version
# already exists (e.g. a dependency-only edit), it's a no-op.
on:
  push:
    branches: [main]
    paths:
      - package.json

concurrency:
  group: auto-tag
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag if the version is new
        env:
          # A tag pushed with the default GITHUB_TOKEN does NOT trigger other
          # workflows, so release.yml would never fire. Create the tag with a PAT
          # instead. Reuses the token already stored for the Homebrew tap push
          # (it has contents:write on this repo); rename to a dedicated
          # RELEASE_TOKEN later if you want clearer separation.
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to do."
            exit 0
          fi
          echo "Creating tag $TAG at $GITHUB_SHA"
          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref="refs/tags/$TAG" -f sha="$GITHUB_SHA" >/dev/null
          echo "Tagged $TAG — release.yml will now build and publish it."
