name: Release

# Build installers for macOS, Windows, and Linux and publish them to a
# GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - 'v*'
  # Manual re-runs: in the "Run workflow" dropdown, pick an existing version tag
  # (e.g. v1.2.3) as the ref. Dispatching from a branch (e.g. main) is a no-op —
  # both jobs are guarded to run only on a v* tag (see `if:` below), so a stray
  # manual run can't publish to the wrong version or half-run.
  workflow_dispatch:

permissions:
  contents: write # required for electron-builder to create/upload the Release

jobs:
  release:
    # Only release from a version tag. On a branch dispatch this is skipped, not failed.
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer bundle
        run: npm run build:renderer

      - name: Build & publish installers
        # electron-builder auto-detects the platform from the runner OS and
        # publishes artifacts + latest*.yml update metadata to the GitHub Release.
        run: npx --no-install electron-builder --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # electron-builder uploads to a DRAFT release. Publish it automatically once all
  # platforms have built, so the release and its assets are public BEFORE the tap
  # is bumped to point at them — a draft asset URL 404s for brew users.
  publish:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$GITHUB_REF_NAME"
          # Best-effort auto-generated notes (merged PRs since the last release).
          NOTES="$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$TAG" -q .body 2>/dev/null || true)"
          if [ -n "$NOTES" ]; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest --notes "$NOTES"
          else
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
          fi

  # After the release is public, refresh the package-manager definitions (Scoop +
  # winget here, Homebrew cask in the tap repo) — the tap now points at live,
  # downloadable assets.
  packages:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Regenerate package definitions
        env:
          # GH_TOKEN reads THIS repo's release assets (same-repo, always scoped).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on mdferdousalam/homebrew-tap, used ONLY to push
          # the Homebrew cask. Required: the tag is already public, so the tap must
          # bump in lockstep. Create a fine-grained token (Repository access: the tap
          # repo only, Permissions: Contents = Read and write) and add it as the
          # HOMEBREW_TAP_TOKEN repo secret.
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error title=Homebrew tap not bumped::HOMEBREW_TAP_TOKEN secret is missing, so the Homebrew cask for $VERSION was NOT pushed to mdferdousalam/homebrew-tap. Installers published fine, but 'brew upgrade' won't see $VERSION until the tap is bumped. Add a PAT with contents:write on the tap as the HOMEBREW_TAP_TOKEN secret, then re-run this job."
            exit 1
          fi
          PUSH_CASK=1 sh scripts/update-packages.sh "$VERSION"

      # Scoop/winget manifests can't be pushed straight to main (the ruleset requires
      # a PR). Open one from a manifests/<tag> branch and merge it via the REST API:
      # the release token (repo admin) is a ruleset bypass actor, so the server allows
      # the merge without a review — but `gh pr merge` refuses a BLOCKED PR client-side,
      # so we call the merge endpoint directly. gh pr create uses the PAT because the
      # default GITHUB_TOKEN isn't permitted to open PRs (or bypass the ruleset).
      - name: Push & merge manifest refresh
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket packaging
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          BRANCH="manifests/${GITHUB_REF_NAME}"
          git commit -m "chore: update package manifests for ${GITHUB_REF_NAME}"
          git push -f origin "HEAD:${BRANCH}"
          gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$BRANCH" \
            --title "chore: package manifests for ${GITHUB_REF_NAME}" \
            --body "Auto-generated Scoop/winget manifests for ${GITHUB_REF_NAME}." \
            || echo "PR for $BRANCH may already exist."
          PRNUM="$(gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" --json number -q .number)"
          for i in 1 2 3 4 5 6; do
            if gh api --method PUT "repos/$GITHUB_REPOSITORY/pulls/$PRNUM/merge" -f merge_method=squash >/dev/null 2>&1; then
              echo "Manifest PR #$PRNUM merged."
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$BRANCH" >/dev/null 2>&1 || true
              exit 0
            fi
            echo "Merge not ready (attempt $i), retrying in 5s..."; sleep 5
          done
          echo "::error::Could not merge manifest PR #$PRNUM for ${GITHUB_REF_NAME}."
          exit 1
