name: Release

# Build installers for macOS, Windows, and Linux and publish them to a
# GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - 'v*'
  # Allow manual runs (won't publish unless a matching release/tag exists).
  workflow_dispatch:

permissions:
  contents: write # required for electron-builder to create/upload the Release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer bundle
        run: npm run build:renderer

      - name: Build & publish installers
        # electron-builder auto-detects the platform from the runner OS and
        # publishes artifacts + latest*.yml update metadata to the GitHub Release.
        run: npx --no-install electron-builder --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After all installers are published, refresh the package-manager definitions
  # (Scoop + winget in this repo, Homebrew cask in the tap repo) with the new
  # version and checksums.
  packages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Regenerate package definitions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional PAT with write access to mdferdousalam/homebrew-tap. If unset,
          # the Homebrew cask push is skipped (Scoop + winget still update).
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -n "$TAP_TOKEN" ]; then
            GH_TOKEN="$TAP_TOKEN" PUSH_CASK=1 sh scripts/update-packages.sh "$VERSION"
          else
            echo "HOMEBREW_TAP_TOKEN not set - updating Scoop + winget only, skipping cask push."
            GH_TOKEN="$GITHUB_TOKEN" PUSH_CASK=0 sh scripts/update-packages.sh "$VERSION"
          fi

      # Branch protection blocks the bot from pushing straight to main, so push the
      # refreshed manifests to a manifests/<tag> branch and print a compare link.
      # Open the PR from there in one click; branch protection stays intact.
      - name: Push manifest-refresh branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket packaging
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          BRANCH="manifests/${GITHUB_REF_NAME}"
          git commit -m "chore: update package manifests for ${GITHUB_REF_NAME}"
          git push -f origin "HEAD:${BRANCH}"
          echo "Manifests pushed to $BRANCH."
          echo "Open a PR: https://github.com/${GITHUB_REPOSITORY}/compare/main...${BRANCH}?expand=1"
